name: Maven Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_DB: automarket
          POSTGRES_USER: automarket
          POSTGRES_PASSWORD: automarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U automarket -d automarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Initialize PostgreSQL schema
        env:
          PGPASSWORD: automarket
        run: |
          until pg_isready -h localhost -p 5432 -U automarket -d automarket; do
            sleep 2
          done
          psql -h localhost -p 5432 -U automarket -d automarket -f schema.sql

      - name: Run tests
        run: mvn test